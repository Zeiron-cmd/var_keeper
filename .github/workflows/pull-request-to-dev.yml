name: Pull Request To Dev
run-name: Run Integration Tests

on:
  pull_request:
    branches:
      - 'dev'

jobs:
  integration_testing:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create virtual env
        shell: bash
        run: python3 -m venv venv

      - name: Install requirements
        shell: bash
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run app
        shell: bash
        run: |
          source venv/bin/activate
          nohup python src/app/app.py > app.log 2>&1 &
          echo $! > app_pid

      - name: Wait for app
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start"
          cat app.log
          exit 1

      - name: Test GET-request
        shell: bash
        run: |
          chmod +x ./test/integration-tests.sh
          ./test/integration-tests.sh

      - name: Stop app
        if: always()
        shell: bash
        run: |
          kill -15 "$(cat app_pid)" || true
