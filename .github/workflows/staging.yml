name: Push Stage version to DockerHub
run-name: Build and push stage image

on:
  push:
    branches:
      - 'dev'

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: bash
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        shell: bash
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pre-pull base image
        shell: bash
        run: |
          docker pull python:3.12.3-alpine

      - name: Build image
        shell: bash
        run: |
          docker build \
            -f ./docker/Dockerfile \
            -t zeiron31/var_keeper:${{ steps.vars.outputs.sha_short }} \
            -t zeiron31/var_keeper:stage \
            .

      - name: Push image with commit tag
        shell: bash
        run: |
          docker push zeiron31/var_keeper:${{ steps.vars.outputs.sha_short }}

      - name: Push image with stage tag
        shell: bash
        run: |
          docker push zeiron31/var_keeper:stage
